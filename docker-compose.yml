services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: kyoma
      POSTGRES_USER: kyoma
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Kyoma_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kyoma"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/ekulos/kyoma:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://kyoma:${POSTGRES_PASSWORD:-Kyoma_secret}@db:5432/kyoma
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:${PORT:-3000}}
      NEXTAUTH_SECRET: ${AUTH_SECRET:-change_me}
      AUTH_SECRET: ${AUTH_SECRET:-change_me}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}

volumes:
  postgres_data:
