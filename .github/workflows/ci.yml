name: Build and push Docker image

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and push (amd64)
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/kanopy-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required secrets
        run: |
          missing=0
          if [ -z "${{ secrets.GHCR_TOKEN }}" ]; then
            echo "::error::GHCR_TOKEN is not set"
            missing=1
          fi
          if [ $missing -ne 0 ]; then
            echo "One or more required secrets are missing. Failing workflow.";
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set short commit SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }}
            ${{ env.IMAGE_NAME }}:latest
          platforms: linux/amd64

          # Use GitHub Actions cache to speed up repeated builds
          cache-from: type=gha,ref=${{ github.ref }}
          cache-to: type=gha,mode=max,ref=${{ github.sha }}
